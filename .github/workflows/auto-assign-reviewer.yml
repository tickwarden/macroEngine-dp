name: Auto-Assign Reviewer on PR

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // ─── Değiştirilen dosyalara göre reviewer ataması ────────────────
            // Kendi reponuza göre bu listeyi güncelleyin
            const REVIEWERS_BY_PATH = [
              {
                pattern: /^data\/macroengine\/functions\//,
                reviewers: ['tickwarden'],
              },
              {
                pattern: /^data\/macroengine\/tags\//,
                reviewers: ['tickwarden'],
              },
              {
                pattern: /^data\/minecraft\//,
                reviewers: ['tickwarden'],
              },
              {
                pattern: /^pack\.mcmeta$/,
                reviewers: ['tickwarden'],
              },
            ];

            // Fallback: herhangi bir eşleşme yoksa
            const FALLBACK_REVIEWERS = ['tickwarden'];

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedPaths = files.map(f => f.filename);
            console.log(`Değiştirilen dosyalar: ${changedPaths.join(', ')}`);

            const reviewerSet = new Set();

            for (const { pattern, reviewers } of REVIEWERS_BY_PATH) {
              if (changedPaths.some(p => pattern.test(p))) {
                reviewers.forEach(r => reviewerSet.add(r));
              }
            }

            if (reviewerSet.size === 0) {
              FALLBACK_REVIEWERS.forEach(r => reviewerSet.add(r));
            }

            // PR yazarını reviewer listesinden çıkar
            const reviewers = [...reviewerSet].filter(r => r !== author);

            if (reviewers.length === 0) {
              console.log('Atanacak reviewer bulunamadı (yazar listede tek kişi olabilir).');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers,
              });
              console.log(`✅ Reviewer(lar) atandı: ${reviewers.join(', ')}`);
            } catch (e) {
              console.log('Reviewer atanamadı:', e.message);
            }
