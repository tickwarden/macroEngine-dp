name: Issue Logic Bug Detector (Return)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  detect-return-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            .github/scripts

      - name: Detect return-related logic bugs
        uses: actions/github-script@v8
        with:
          script: |
            // Datapack reposu için güvenli yol
            const scriptPath = './.github/scripts/detect-return-logic.js';
            const script = require(scriptPath);
            await script({ github, context });
