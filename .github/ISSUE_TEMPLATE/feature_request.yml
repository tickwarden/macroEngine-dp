name: Feature Request
description: Suggest a new feature, module or improvement
title: "[FEATURE] "
labels:
  - enhancement
assignees: []
body:
  # ─────────────────────────────────────────────
  # 1. CATEGORY
  # ─────────────────────────────────────────────
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which module does this feature belong to?
      options:
        - "cmd/ — Command wrapper"
        - "math/ — Mathematics"
        - "string/ — String / Display"
        - "lib/ — Library / Utilities"
        - "geo/ — Location / Region"
        - "inv/ — Inventory"
        - "entity/ — Entity"
        - "player/ — Player"
        - "event/ — Event system"
        - "cooldown/ — Cooldown"
        - "trigger/ — Trigger"
        - "flag/ — Flag"
        - "state/ — State"
        - "log/ — Log"
        - "dialog/ — Dialog (1.21.6+)"
        - "hook/ — Hook"
        - "interaction/ — Interaction"
        - "New module"
        - "Other"
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 2. A.M.E. VERSION
  # ─────────────────────────────────────────────
  - type: dropdown
    id: ame_version
    attributes:
      label: A.M.E. Version
      description: Which version of A.M.E. are you using?
      options:
        - "v2.0.1 (latest)"
        - "v2.0.0"
        - "v1.x"
        - "I don't know"
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 3. MINECRAFT VERSION
  # ─────────────────────────────────────────────
  - type: dropdown
    id: mc_version
    attributes:
      label: Minecraft Version
      description: For which Minecraft version should this feature work?
      options:
        - "1.21.6+ (pack_format 80-94)"
        - "1.21.2 – 1.21.5 (pack_format 48-79)"
        - "Both versions"
        - "Version independent"
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 4. PROBLEM / MOTIVATION
  # ─────────────────────────────────────────────
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem are you facing or what are you unable to do without this feature?
      placeholder: |
        Example: I can run delayed functions with macro:lib/wait, 
        but I cannot know in advance on which tick it will fire.
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 5. PROPOSAL
  # ─────────────────────────────────────────────
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: >
        How should this feature work? 
        Please include the desired function name, input/output format, and usage example if possible.
      placeholder: |
        macro:lib/wait_until

        INPUT: macro:input { func:"<namespace:path>", predicate:"<namespace:path>", timeout:<tick> }
        OUTPUT: macro:output { fired:1b } ← if triggered before timeout

        # Example usage:
        data modify storage macro:input func set value "mypack:reward/give"
        data modify storage macro:input predicate set value "mypack:pred/is_on_ground"
        data modify storage macro:input timeout set value 100
        function macro:lib/wait_until with storage macro:input {}
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 6. CURRENT WORKAROUND
  # ─────────────────────────────────────────────
  - type: textarea
    id: alternatives
    attributes:
      label: Current Workaround (Optional)
      description: How are you currently solving this problem?
      placeholder: |
        I'm currently using macro:lib/schedule + manual predicate checks, 
        but I have to create separate functions for every scenario.

  # ─────────────────────────────────────────────
  # 7. IMPACT / PRIORITY
  # ─────────────────────────────────────────────
  - type: dropdown
    id: impact
    attributes:
      label: Impact / Priority
      description: How important is this feature to you?
      options:
        - "🔴 Critical — I cannot do something without it"
        - "🟠 High — It makes an important task much harder"
        - "🟡 Medium — Would be nice, but I have a workaround"
        - "🟢 Low — Nice-to-have"
    validations:
      required: true

  # ─────────────────────────────────────────────
  # 8. BREAKING CHANGE
  # ─────────────────────────────────────────────
  -
